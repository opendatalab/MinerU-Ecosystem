variables:
  BINARY_NAME: mineru-open-api-cli
  OSS_PATH: open-api-cli
  PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
  PIP_TRUSTED_HOST: pypi.tuna.tsinghua.edu.cn

stages:
  - build
  - test
  - release

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  CLI
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# cli/ 或 sdk/go/ 有变更时编译验证
cli:build:
  stage: build
  tags:
    - ecs
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - changes:
        - cli/mineru-open-api/**
        - sdk/go/**
  script:
    - >
      docker build --network host
      --build-arg TARGETS="verify"
      -f cli/mineru-open-api/Dockerfile.ci .

# 打 cli/mineru-open-api/v* tag 时交叉编译 + 上传 OSS
cli:release:
  stage: release
  tags:
    - ecs
  rules:
    - if: $CI_COMMIT_TAG =~ /^cli\/mineru-open-api\/v/
  script:
    - export VERSION=${CI_COMMIT_TAG#cli/mineru-open-api/}
    - >
      export LDFLAGS="-s -w
      -X github.com/opendatalab/MinerU-Ecosystem/cli/mineru-open-api/cmd.version=${VERSION}
      -X github.com/opendatalab/MinerU-Ecosystem/cli/mineru-open-api/cmd.commit=${CI_COMMIT_SHORT_SHA}
      -X github.com/opendatalab/MinerU-Ecosystem/cli/mineru-open-api/cmd.date=${CI_PIPELINE_CREATED_AT}"

    # 交叉编译
    - >
      docker build --network host
      --build-arg LDFLAGS="${LDFLAGS}"
      --build-arg TARGETS="linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64"
      -t ${BINARY_NAME}:build
      -f cli/mineru-open-api/Dockerfile.ci .

    # 提取二进制
    - docker rm -f extract 2>/dev/null || true
    - docker create --name extract ${BINARY_NAME}:build
    - docker cp extract:/output/ ./output/
    - docker rm extract
    - ls -la ./output/

    # 上传 OSS
    - wget -qO ossutil https://gosspublic.alicdn.com/ossutil/1.7.18/ossutil64
    - chmod +x ossutil
    - ./ossutil config -e ${OSS_ENDPOINT} -i ${OSS_ACCESS_KEY_ID} -k ${OSS_ACCESS_KEY_SECRET}
    - ./ossutil cp ./output/${BINARY_NAME}-linux-amd64       oss://${OSS_BUCKET}/${OSS_PATH}/${VERSION}/ -f --acl public-read
    - ./ossutil cp ./output/${BINARY_NAME}-linux-arm64       oss://${OSS_BUCKET}/${OSS_PATH}/${VERSION}/ -f --acl public-read
    - ./ossutil cp ./output/${BINARY_NAME}-darwin-amd64      oss://${OSS_BUCKET}/${OSS_PATH}/${VERSION}/ -f --acl public-read
    - ./ossutil cp ./output/${BINARY_NAME}-darwin-arm64      oss://${OSS_BUCKET}/${OSS_PATH}/${VERSION}/ -f --acl public-read
    - ./ossutil cp ./output/${BINARY_NAME}-windows-amd64.exe oss://${OSS_BUCKET}/${OSS_PATH}/${VERSION}/ -f --acl public-read
    - ./ossutil cp ./output/${BINARY_NAME}-windows-arm64.exe oss://${OSS_BUCKET}/${OSS_PATH}/${VERSION}/ -f --acl public-read
    - ./ossutil cp ./output/${BINARY_NAME}-linux-amd64       oss://${OSS_BUCKET}/${OSS_PATH}/latest/ -f --acl public-read
    - ./ossutil cp ./output/${BINARY_NAME}-linux-arm64       oss://${OSS_BUCKET}/${OSS_PATH}/latest/ -f --acl public-read
    - ./ossutil cp ./output/${BINARY_NAME}-darwin-amd64      oss://${OSS_BUCKET}/${OSS_PATH}/latest/ -f --acl public-read
    - ./ossutil cp ./output/${BINARY_NAME}-darwin-arm64      oss://${OSS_BUCKET}/${OSS_PATH}/latest/ -f --acl public-read
    - ./ossutil cp ./output/${BINARY_NAME}-windows-amd64.exe oss://${OSS_BUCKET}/${OSS_PATH}/latest/ -f --acl public-read
    - ./ossutil cp ./output/${BINARY_NAME}-windows-arm64.exe oss://${OSS_BUCKET}/${OSS_PATH}/latest/ -f --acl public-read
    - ./ossutil cp cli/mineru-open-api/install/install.sh  oss://${OSS_BUCKET}/${OSS_PATH}/install.sh  -f --acl public-read --meta Content-Type:text/plain
    - ./ossutil cp cli/mineru-open-api/install/install.ps1 oss://${OSS_BUCKET}/${OSS_PATH}/install.ps1 -f --acl public-read --meta Content-Type:text/plain
    - echo ${VERSION} > VERSION
    - ./ossutil cp VERSION oss://${OSS_BUCKET}/${OSS_PATH}/VERSION -f --acl public-read --meta Content-Type:text/plain
  artifacts:
    untracked: true
    paths:
      - output/
    expire_in: 1 hour

# CLI 发布到 npm（依赖 cli:release 的 artifacts）
cli:npm:
  stage: release
  tags:
    - ecs
  image: node:20-slim
  needs: ["cli:release"]
  rules:
    - if: $CI_COMMIT_TAG =~ /^cli\/mineru-open-api\/v/
  script:
    - export VERSION=${CI_COMMIT_TAG#cli/mineru-open-api/}
    - export NPM_VERSION=${VERSION#v}
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc

    # 复制二进制到平台包目录
    - NPM_DIR=cli/mineru-open-api/npm
    - mkdir -p ${NPM_DIR}/mineru-open-api-linux-x64/bin
    - mkdir -p ${NPM_DIR}/mineru-open-api-linux-arm64/bin
    - mkdir -p ${NPM_DIR}/mineru-open-api-darwin-x64/bin
    - mkdir -p ${NPM_DIR}/mineru-open-api-darwin-arm64/bin
    - mkdir -p ${NPM_DIR}/mineru-open-api-win32-x64/bin
    - mkdir -p ${NPM_DIR}/mineru-open-api-win32-arm64/bin
    - cp ./output/${BINARY_NAME}-linux-amd64        ${NPM_DIR}/mineru-open-api-linux-x64/bin/mineru-open-api
    - cp ./output/${BINARY_NAME}-linux-arm64        ${NPM_DIR}/mineru-open-api-linux-arm64/bin/mineru-open-api
    - cp ./output/${BINARY_NAME}-darwin-amd64       ${NPM_DIR}/mineru-open-api-darwin-x64/bin/mineru-open-api
    - cp ./output/${BINARY_NAME}-darwin-arm64       ${NPM_DIR}/mineru-open-api-darwin-arm64/bin/mineru-open-api
    - cp ./output/${BINARY_NAME}-windows-amd64.exe  ${NPM_DIR}/mineru-open-api-win32-x64/bin/mineru-open-api.exe
    - cp ./output/${BINARY_NAME}-windows-arm64.exe  ${NPM_DIR}/mineru-open-api-win32-arm64/bin/mineru-open-api.exe

    # 更新版本号并发布平台包
    - >
      for pkg in linux-x64 linux-arm64 darwin-x64 darwin-arm64 win32-x64 win32-arm64; do
        cd ${CI_PROJECT_DIR}/${NPM_DIR}/mineru-open-api-${pkg} ;
        npm version ${NPM_VERSION} --no-git-tag-version --allow-same-version ;
        npm publish --access public ;
      done

    # 更新主包版本号（含 optionalDependencies 版本）并发布
    - cd ${CI_PROJECT_DIR}/${NPM_DIR}/mineru-open-api
    - sed -i "s/\"0.0.0\"/\"${NPM_VERSION}\"/g" package.json
    - cat package.json
    - npm publish --access public
  environment:
    name: npm
    url: https://www.npmjs.com/package/mineru-open-api

# CLI 发布到 PyPI（依赖 cli:release 的 artifacts）
cli:pypi:
  stage: release
  tags:
    - ecs
  image: python:3.12-slim
  needs: ["cli:release"]
  rules:
    - if: $CI_COMMIT_TAG =~ /^cli\/mineru-open-api\/v/
  script:
    - export VERSION=${CI_COMMIT_TAG#cli/mineru-open-api/}
    - export PKG_VERSION=${VERSION#v}
    - pip install --upgrade pip
    - pip install --timeout 120 build wheel twine

    - cd cli/mineru-open-api/pypi
    - sed -i "s/^version = .*/version = \"${PKG_VERSION}\"/" pyproject.toml
    - mkdir -p dist
    - >
      PLATFORMS="linux-amd64:manylinux_2_17_x86_64.manylinux2014_x86_64
      linux-arm64:manylinux_2_17_aarch64.manylinux2014_aarch64
      darwin-amd64:macosx_10_9_x86_64
      darwin-arm64:macosx_11_0_arm64
      windows-amd64:win_amd64
      windows-arm64:win_arm64"
    - >
      for entry in ${PLATFORMS}; do
        plat=$(echo ${entry} | cut -d: -f1) ;
        tag=$(echo ${entry} | cut -d: -f2) ;
        os_name=$(echo ${plat} | cut -d- -f1) ;
        echo "=== Building wheel for ${plat} (tag: ${tag}) ===" ;
        rm -rf src/mineru_open_api/bin ;
        mkdir -p src/mineru_open_api/bin ;
        if [ "${os_name}" = "windows" ]; then
          cp ${CI_PROJECT_DIR}/output/${BINARY_NAME}-${plat}.exe src/mineru_open_api/bin/mineru-open-api-${plat}.exe ;
        else
          cp ${CI_PROJECT_DIR}/output/${BINARY_NAME}-${plat} src/mineru_open_api/bin/mineru-open-api-${plat} ;
        fi ;
        python -m build --wheel ;
        python -m wheel tags --platform-tag ${tag} --remove dist/*.whl ;
        mkdir -p ${CI_PROJECT_DIR}/all_wheels ;
        mv dist/*.whl ${CI_PROJECT_DIR}/all_wheels/ ;
        rm -rf dist ;
        mkdir -p dist ;
      done
    - twine upload ${CI_PROJECT_DIR}/all_wheels/*.whl --non-interactive
  environment:
    name: pypi
    url: https://pypi.org/project/mineru-open-api/

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  Python SDK
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# sdk/python/ 有变更时运行测试
sdk:python:test:
  stage: test
  tags:
    - ecs
  image: python:3.12-slim
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - changes:
        - sdk/python/**
  script:
    - cd sdk/python
    - pip install -e ".[dev]" 2>/dev/null || pip install -e .
    - python -c "import mineru; print('import ok, version', mineru.__version__ if hasattr(mineru, '__version__') else 'n/a')"

# 打 sdk/python/v* tag 时构建并发布到 PyPI
sdk:python:release:
  stage: release
  tags:
    - ecs
  image: python:3.12-slim
  rules:
    - if: $CI_COMMIT_TAG =~ /^sdk\/python\/v/
  script:
    - export VERSION=${CI_COMMIT_TAG#sdk/python/v}
    - cd sdk/python

    # 用 tag 版本覆盖 pyproject.toml 中的 version
    - sed -i "s/^version = .*/version = \"${VERSION}\"/" pyproject.toml
    - cat pyproject.toml | grep "^version"

    # 构建
    - pip install --upgrade pip
    - pip install --timeout 120 build twine
    - python -m build
    - ls -la dist/

    # 发布到 PyPI
    - twine upload dist/* --non-interactive
  environment:
    name: pypi
    url: https://pypi.org/project/mineru-open-sdk/

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  TypeScript SDK
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# sdk/typescript/ 有变更时运行构建 + 类型检查
sdk:typescript:test:
  stage: test
  tags:
    - ecs
  image: node:20-slim
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - changes:
        - sdk/typescript/**
  script:
    - cd sdk/typescript
    - npm ci
    - npm run lint
    - npm run build

# 打 sdk/typescript/v* tag 时构建并发布到 npm
sdk:typescript:release:
  stage: release
  tags:
    - ecs
  image: node:20-slim
  rules:
    - if: $CI_COMMIT_TAG =~ /^sdk\/typescript\/v/
  script:
    - export VERSION=${CI_COMMIT_TAG#sdk/typescript/v}
    - cd sdk/typescript

    # 用 tag 版本覆盖 package.json 中的 version
    - npm version ${VERSION} --no-git-tag-version --allow-same-version
    - cat package.json | grep '"version"'

    # 构建 + 发布
    - npm ci
    - npm run build
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
    - npm publish --access public
  environment:
    name: npm
    url: https://www.npmjs.com/package/mineru-open-sdk


stages:
  - build
  - release

variables:
  GO_VERSION: "1.21"
  BINARY_NAME: mineru
  OSS_PATH: mineru-cli

# ── build: 每次 push 都编译验证 ──

build:
  stage: build
  image: golang:${GO_VERSION}
  script:
    - go build ./...
    - go vet ./...
  except:
    - tags

# ── release: 打 tag 时交叉编译 + 上传 OSS ──

release:
  stage: release
  image: golang:${GO_VERSION}
  only:
    - tags
  variables:
    LDFLAGS: "-s -w -X github.com/OpenDataLab/mineru-open-cli/cmd.version=${CI_COMMIT_TAG} -X github.com/OpenDataLab/mineru-open-cli/cmd.commit=${CI_COMMIT_SHORT_SHA} -X github.com/OpenDataLab/mineru-open-cli/cmd.date=${CI_PIPELINE_CREATED_AT}"
  script:
    # 交叉编译 5 个平台
    - CGO_ENABLED=0 GOOS=linux   GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o ${BINARY_NAME}-linux-amd64
    - CGO_ENABLED=0 GOOS=linux   GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o ${BINARY_NAME}-linux-arm64
    - CGO_ENABLED=0 GOOS=darwin  GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o ${BINARY_NAME}-darwin-amd64
    - CGO_ENABLED=0 GOOS=darwin  GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o ${BINARY_NAME}-darwin-arm64
    - CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o ${BINARY_NAME}-windows-amd64.exe

    # 安装 ossutil
    - curl -fsSL -o ossutil https://gosspublic.alicdn.com/ossutil/1.7.19/ossutil-v1.7.19-linux-amd64
    - chmod +x ossutil

    # 上传到版本目录
    - ./ossutil config -e ${OSS_ENDPOINT} -i ${OSS_ACCESS_KEY_ID} -k ${OSS_ACCESS_KEY_SECRET}
    - ./ossutil cp ${BINARY_NAME}-linux-amd64       oss://${OSS_BUCKET}/${OSS_PATH}/${CI_COMMIT_TAG}/ -f
    - ./ossutil cp ${BINARY_NAME}-linux-arm64       oss://${OSS_BUCKET}/${OSS_PATH}/${CI_COMMIT_TAG}/ -f
    - ./ossutil cp ${BINARY_NAME}-darwin-amd64      oss://${OSS_BUCKET}/${OSS_PATH}/${CI_COMMIT_TAG}/ -f
    - ./ossutil cp ${BINARY_NAME}-darwin-arm64      oss://${OSS_BUCKET}/${OSS_PATH}/${CI_COMMIT_TAG}/ -f
    - ./ossutil cp ${BINARY_NAME}-windows-amd64.exe oss://${OSS_BUCKET}/${OSS_PATH}/${CI_COMMIT_TAG}/ -f

    # 同步到 latest
    - ./ossutil cp ${BINARY_NAME}-linux-amd64       oss://${OSS_BUCKET}/${OSS_PATH}/latest/ -f
    - ./ossutil cp ${BINARY_NAME}-linux-arm64       oss://${OSS_BUCKET}/${OSS_PATH}/latest/ -f
    - ./ossutil cp ${BINARY_NAME}-darwin-amd64      oss://${OSS_BUCKET}/${OSS_PATH}/latest/ -f
    - ./ossutil cp ${BINARY_NAME}-darwin-arm64      oss://${OSS_BUCKET}/${OSS_PATH}/latest/ -f
    - ./ossutil cp ${BINARY_NAME}-windows-amd64.exe oss://${OSS_BUCKET}/${OSS_PATH}/latest/ -f

    # 上传安装脚本
    - ./ossutil cp install/install.sh  oss://${OSS_BUCKET}/${OSS_PATH}/install.sh  -f --meta Content-Type:text/plain
    - ./ossutil cp install/install.ps1 oss://${OSS_BUCKET}/${OSS_PATH}/install.ps1 -f --meta Content-Type:text/plain

variables:
  BINARY_NAME: mineru-open-api-cli
  OSS_PATH: open-api-cli
  SDK_REPO: https://oauth2:${CI_USER_TOKEN}@gitlab.pjlab.org.cn/yangqi/mineru-open-sdk-go.git

stages:
  - build
  - release

# ── build: 每次 push 都编译验证 ──

build:
  stage: build
  tags:
    - ecs
  script:
    - >
      docker build --network host
      --build-arg SDK_REPO="${SDK_REPO}"
      --build-arg TARGETS="verify"
      -f Dockerfile.ci .
  except:
    - tags

# ── release: 打 tag 时交叉编译 + 上传 OSS ──

release:
  stage: release
  tags:
    - ecs
  only:
    - tags
  script:
    - export LDFLAGS="-s -w -X github.com/OpenDataLab/mineru-open-cli/cmd.version=${CI_COMMIT_TAG} -X github.com/OpenDataLab/mineru-open-cli/cmd.commit=${CI_COMMIT_SHORT_SHA} -X github.com/OpenDataLab/mineru-open-cli/cmd.date=${CI_PIPELINE_CREATED_AT}"

    # 交叉编译 6 个平台
    - >
      docker build --network host
      --build-arg SDK_REPO="${SDK_REPO}"
      --build-arg LDFLAGS="${LDFLAGS}"
      --build-arg TARGETS="linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64"
      -t ${BINARY_NAME}:build
      -f Dockerfile.ci .

    # 从构建镜像里提取二进制
    - docker create --name extract ${BINARY_NAME}:build
    - docker cp extract:/output/. .
    - docker rm extract

    # 安装 ossutil
    - wget -qO ossutil https://gosspublic.alicdn.com/ossutil/1.7.18/ossutil64
    - chmod +x ossutil
    - ./ossutil config -e ${OSS_ENDPOINT} -i ${OSS_ACCESS_KEY_ID} -k ${OSS_ACCESS_KEY_SECRET}

    # 上传到版本目录
    - ./ossutil cp ${BINARY_NAME}-linux-amd64       oss://${OSS_BUCKET}/${OSS_PATH}/${CI_COMMIT_TAG}/ -f
    - ./ossutil cp ${BINARY_NAME}-linux-arm64       oss://${OSS_BUCKET}/${OSS_PATH}/${CI_COMMIT_TAG}/ -f
    - ./ossutil cp ${BINARY_NAME}-darwin-amd64      oss://${OSS_BUCKET}/${OSS_PATH}/${CI_COMMIT_TAG}/ -f
    - ./ossutil cp ${BINARY_NAME}-darwin-arm64      oss://${OSS_BUCKET}/${OSS_PATH}/${CI_COMMIT_TAG}/ -f
    - ./ossutil cp ${BINARY_NAME}-windows-amd64.exe oss://${OSS_BUCKET}/${OSS_PATH}/${CI_COMMIT_TAG}/ -f
    - ./ossutil cp ${BINARY_NAME}-windows-arm64.exe oss://${OSS_BUCKET}/${OSS_PATH}/${CI_COMMIT_TAG}/ -f

    # 同步到 latest
    - ./ossutil cp ${BINARY_NAME}-linux-amd64       oss://${OSS_BUCKET}/${OSS_PATH}/latest/ -f
    - ./ossutil cp ${BINARY_NAME}-linux-arm64       oss://${OSS_BUCKET}/${OSS_PATH}/latest/ -f
    - ./ossutil cp ${BINARY_NAME}-darwin-amd64      oss://${OSS_BUCKET}/${OSS_PATH}/latest/ -f
    - ./ossutil cp ${BINARY_NAME}-darwin-arm64      oss://${OSS_BUCKET}/${OSS_PATH}/latest/ -f
    - ./ossutil cp ${BINARY_NAME}-windows-amd64.exe oss://${OSS_BUCKET}/${OSS_PATH}/latest/ -f
    - ./ossutil cp ${BINARY_NAME}-windows-arm64.exe oss://${OSS_BUCKET}/${OSS_PATH}/latest/ -f

    # 上传安装脚本
    - ./ossutil cp install/install.sh  oss://${OSS_BUCKET}/${OSS_PATH}/install.sh  -f --meta Content-Type:text/plain
    - ./ossutil cp install/install.ps1 oss://${OSS_BUCKET}/${OSS_PATH}/install.ps1 -f --meta Content-Type:text/plain

    # 写入版本号文件（供安装脚本和 CLI 自更新读取）
    - echo ${CI_COMMIT_TAG} > VERSION
    - ./ossutil cp VERSION oss://${OSS_BUCKET}/${OSS_PATH}/VERSION -f --meta Content-Type:text/plain
